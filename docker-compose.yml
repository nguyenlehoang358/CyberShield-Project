version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: myweb-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - myweb-internal
      - myweb-public
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-springboot_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myweb-redis
    networks:
      - myweb-internal
      - myweb-public
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: myweb-ollama
    networks:
      - myweb-internal
      - myweb-public
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment below for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # backend:
    #   build:
    #     context: .
    #     dockerfile: Dockerfile
    #   container_name: myweb-api
    #   networks:
    #     - myweb-internal
    #     - myweb-public
    #   depends_on:
    #     db:
    #       condition: service_healthy
    #     redis:
    #       condition: service_healthy
    #   ports:
    #     - "8444:8443"
    #   environment:
    #     SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
    #     SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
    #     SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    #     SPRING_JPA_HIBERNATE_DDL_AUTO: update
    #     REDIS_HOST: redis
    #     REDIS_PORT: 6379
    #     OLLAMA_BASE_URL: http://ollama:11434
    #     LOGSTASH_HOST: logstash
    #   restart: on-failure

    # frontend:
    #   build:
    #     context: ./frontend
    #     dockerfile: Dockerfile
    #   container_name: myweb-ui
    #   networks:
    #     - myweb-public
    #   depends_on:
    #     - backend
    #   ports:
    #     - "3000:80"
    #   restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: myweb-pgadmin
    networks:
      - myweb-internal
      - myweb-public
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: myweb-elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - myweb-internal
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: myweb-logstash
    networks:
      - myweb-internal
    ports:
      - "5000:5000"
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: myweb-kibana
    networks:
      - myweb-internal
      - myweb-public
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  ollama_data:
  elasticsearch_data:


networks:
  myweb-internal:
    driver: bridge
    internal: true
  myweb-public:
    driver: bridge
